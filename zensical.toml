[project]
site_name = "FastELT"
site_description = "A FastAPI-inspired ELT pipeline library"
site_author = "Léo Grosjean"
site_url = "https://lgrosjean.github.io/fastelt/"
repo_url = "https://github.com/lgrosjean/fastelt"
repo_name = "lgrosjean/fastelt"
docs_dir = "docs"
font.text = "Inter"

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Why FastELT?" = "getting-started/why-fastelt.md"},
    {"Installation" = "getting-started/installation.md"},
    {"Quickstart" = "getting-started/quickstart.md"},
  ]},
  {"User Guide" = [
    {"Sources" = "guide/sources.md"},
    {"Bigger Applications" = "guide/bigger-applications.md"},
    {"REST API" = "guide/rest-api.md"},
    {"Filesystem" = "guide/filesystem.md"},
    {"Validation" = "guide/validation.md"},
    {"CLI" = "guide/cli.md"},
  ]},
  {"Examples" = [
    {"Custom Source: MLflow" = "examples/custom-source-mlflow.md"},
    {"Parent-Child: GitHub" = "examples/parent-child-github.md"},
  ]},
  {"API Reference" = [
    {"FastELT" = "api/app.md"},
    {"Source" = "api/source.md"},
    {"Destination" = "api/destination.md"},
    {"Config (Env, Secret)" = "api/config.md"},
    {"Types" = "api/types.md"},
    {"REST API Source" = "api/rest-api-source.md"},
    {"Filesystem Source" = "api/filesystem-source.md"},
  ]},
]

[project.theme]
features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.path",
  "search.highlight",
]
logo = "assets/favicon.svg"
favicon = "assets/favicon.svg"

[project.theme.palette]
primary = "teal"
accent = "amber"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true